<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LU Complexity Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: #2a2a30;
    --text: #e8e8ec;
    --muted: #6b6b78;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --lu-blue: #3b82f6;
    --lu-blue-dim: rgba(59,130,246,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* --- Layout & Typography --- */
  .header {
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.5px; }
  .logo span { color: var(--lu-blue); }

  .layout { display: grid; grid-template-columns: 250px 1fr 270px; height: calc(100vh - 57px); }

  /* --- Badges & Status --- */
  .status-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; border: 1px solid;
    transition: all 0.3s;
  }
  .status-badge.green { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--green); }
  .status-badge.amber { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--amber); }
  .status-badge.red   { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.3);  color: var(--red); }
  .status-badge.neutral { background: var(--surface2); border-color: var(--border); color: var(--muted); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  /* --- Left Panel --- */
  .left-panel {
    border-right: 1px solid var(--border); padding: 20px 16px;
    overflow-y: auto; background: var(--surface);
    display: flex; flex-direction: column; gap: 20px;
  }
  .section-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 9px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--lu-blue); }
  .field select option { background: #1e1e24; }

  .tab-btn {
    padding: 9px 12px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer; text-align: left; transition: all 0.2s;
    display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 3px;
  }
  .tab-btn:hover { background: var(--surface2); color: var(--text); }
  .tab-btn.active { background: var(--lu-blue-dim); border-color: rgba(59,130,246,0.3); color: var(--lu-blue); }
  .tab-pill { font-family: 'DM Mono', monospace; font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--surface2); }

  .score-meter { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .meter-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .meter-value { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; }
  .meter-range { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .meter-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 3px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s; }

  /* --- Main Content (Table) --- */
  .main-content { overflow-y: auto; }
  .col-headers {
    display: grid; grid-template-columns: 1fr 155px 62px 75px;
    padding: 9px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 20;
  }
  .col-h { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .col-h.right { text-align: right; }

  .category-group { border-bottom: 1px solid var(--border); }
  .category-header {
    padding: 9px 20px; background: var(--surface2);
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border);
  }
  .score-row {
    display: grid; grid-template-columns: 1fr 155px 62px 75px;
    padding: 11px 20px; border-bottom: 1px solid rgba(42,42,48,0.5);
    align-items: center; gap: 12px; transition: background 0.15s;
  }
  .score-row:hover { background: rgba(255,255,255,0.02); }
  .row-question { font-size: 12.5px; line-height: 1.45; color: var(--text); }
  .row-answer select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 7px; color: var(--text);
    font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; transition: border-color 0.2s;
  }
  .row-answer select:focus { border-color: var(--lu-blue); }
  .row-answer select.critical { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.06); }
  .row-answer select.not-needed { border-color: rgba(34,197,94,0.35); }
  .row-answer select.nice { border-color: rgba(245,158,11,0.35); }
  .row-weight { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-align: right; }
  .row-wscore { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; text-align: right; }
  .row-wscore.pos { color: var(--green); }
  .row-wscore.neg { color: var(--red); }
  .row-wscore.zero { color: var(--muted); }

  /* --- Right Panel --- */
  .right-panel {
    border-left: 1px solid var(--border); padding: 20px 16px;
    overflow-y: auto; background: var(--surface);
    display: flex; flex-direction: column; gap: 18px;
  }
  .next-step-item {
    padding: 9px 11px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; line-height: 1.5; color: var(--text);
    display: flex; gap: 9px; align-items: flex-start; margin-bottom: 6px;
  }
  .step-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); min-width: 16px; padding-top: 1px; }
  .breakdown-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 5px; }
  .breakdown-cat { color: var(--muted); }
  .breakdown-val { font-family: 'DM Mono', monospace; }

  .export-btn {
    background: var(--lu-blue); color: white; border: none; border-radius: 7px;
    padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; width: 100%; transition: opacity 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .export-btn:hover { opacity: 0.9; }
  .export-btn:active { transform: scale(0.98); }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px;
    font-size: 13px; z-index: 999; opacity: 0; transform: translateY(8px);
    transition: all 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* --- Mobile Responsiveness --- */
  @media (max-width: 992px) {
    .layout {
      grid-template-columns: 1fr;
      height: auto;
    }
    .left-panel, .right-panel {
      border: none;
      border-bottom: 1px solid var(--border);
      height: auto;
      overflow-y: visible;
    }
    .main-content { overflow-y: visible; }
  }

  @media (max-width: 600px) {
    .col-headers { display: none; } /* Hide tabular headers on small screens */
    .score-row {
      grid-template-columns: 1fr;
      padding: 16px 20px;
      gap: 12px;
    }
    .row-question { font-weight: 500; margin-bottom: 4px; }
    
    /* Convert rows to card-style labels */
    .row-weight, .row-wscore {
      display: flex;
      justify-content: space-between;
      text-align: left;
    }
    .row-weight::before { content: "Weight:"; color: var(--muted); font-family: 'DM Sans', sans-serif; }
    .row-wscore::before { content: "Score:"; color: var(--muted); font-family: 'DM Sans', sans-serif; }
  }
</style>
</head>

<div class="header">

<div class="layout">

      <div class="field">

          <option value="I">Internal</option>
          <option value="E">External</option>
          <option value="B">Both</option>
        </select>
      </div>
      <div class="field">
        <label>Deal Stage</label>
        <select id="dealStage" onchange="App.recompute()">
          <option value="Initial Discovery">Initial Discovery</option>
          <option value="Initial Demo">Initial Demo</option>
          <option value="Deep Dive Discovery">Deep Dive Discovery</option>
          <option value="Deep Dive Demo">Deep Dive Demo</option>
          <option value="Trial">Trial</option>
          <option value="Solution Validation">Solution Validation</option>
        </select>
      </div>
    </div>
    <div>
      <div class="section-label">Scorecard Type</div>
      <button class="tab-btn active" onclick="App.switchTab('employee')" id="tab-employee">Employee Training <span class="tab-pill" id="pill-employee">—</span></button>
      <button class="tab-btn" onclick="App.switchTab('customer')" id="tab-customer">Customer Education <span class="tab-pill" id="pill-customer">—</span></button>
      <button class="tab-btn" onclick="App.switchTab('member')" id="tab-member">Member / Association <span class="tab-pill" id="pill-member">—</span></button>
    </div>
    <div>
      <div class="section-label">Complexity Score</div>
      <div class="score-meter">
        <div class="meter-label">
          <span class="meter-value" id="scoreDisplay" style="color:var(--muted)">0</span>
          <span class="meter-range" id="rangeDisplay">—</span>
        </div>
        <div class="meter-track"><div class="meter-fill" id="meterFill" style="width:50%;background:var(--muted)"></div></div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="col-headers">
      <div class="col-h">Requirement / Feature</div>
      <div class="col-h">Assessment</div>
      <div class="col-h right">Weight</div>
      <div class="col-h right">W.Score</div>
    </div>
    <div id="rowsContainer"></div>
  </div>

  <div class="right-panel">
    <div>
      <div class="section-label">Status</div>
      <div id="statusBlock" class="status-badge neutral" style="width:100%;justify-content:flex-start;gap:10px;padding:12px 14px;">

        <div>
          <div style="font-size:13px;font-weight:500" id="statusTitle">—</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px" id="statusSub">Fill in the scorecard</div>
        </div>
      </div>
    </div>
    <div>
      <div class="section-label">Score by Category</div>
      <div id="breakdownGrid"></div>
    </div>
    <div>
      <div class="section-label">Suggested Next Steps</div>
      <div id="nextStepsList">
        <div class="next-step-item" style="color:var(--muted)"><span class="step-num">—</span><span>Complete the assessment to see recommended actions</span></div>
      </div>
    </div>
    <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border)">
      <button class="export-btn" onclick="App.exportExcel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export to Excel
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

        { cat:"eCommerce",          q:"Complex eCommerce pricing model (subscriptions, geo-specific)",                             w:{I:8,  E:8,  B:8  }, type:"crit" },
        { cat:"eCommerce",          q:"Unsupported eCommerce payments (payment gateway, Pay with PO)",                             w:{I:8,  E:8,  B:8  }, type:"crit" },
        { cat:"External Focus",     q:"Complex billing / finance processes related to LMS",                                        w:{I:8,  E:8,  B:8  }, type:"crit" },
        { cat:"Existing Solution",  q:"Using Custom or Legacy LMS",                                                                w:{I:3,  E:3,  B:3  }, type:"crit" },
        { cat:"Social",             q:"Deep community feature requirements",                                                       w:{I:5,  E:5,  B:5  }, type:"crit" },
        { cat:"Social",             q:"Sharing badges or gamification on social",                                                  w:{I:5,  E:5,  B:5  }, type:"crit" },
        { cat:"Pain",               q:"Has clearly identified pain that LearnUpon can solve",                                      w:{I:10, E:10, B:10 }, type:"pain" },
      ]
    }
  },
  NEXT_STEPS: {
    Discovery_NotRisky:      ["Schedule Tech Discovery","Schedule Demo","Make Exec Connection"],
    Discovery_Risky:         ["Discuss with Sales Manager & SE Manager","Open up about gap & test willingness to adapt process","Deep dive on specific gap(s)","Discuss gaps with product","Gather workarounds with SA / SE / CX Teams"],
    Discovery_VeryRisky:     ["Discuss with Manager, SE Manager & Tommy/Laura/Des","No-Go and Pull out of process","Deep dive on specific gap(s)"],
    Demo_NotRisky:           ["Engage senior prospect stakeholders","Suggest Trial","Additional Demo","Deeper Dive Discovery","Deeper Dive Demo"],
    Demo_Risky:              ["Be clear about gaps & test willingness to adapt process","Deep dive on specific gap(s)","Discuss gaps with product for future development","Organise follow-up call to address specific product gap / bring PM for that area"],
    Demo_VeryRisky:          ["List gaps and get prioritisation from prospect","No-Go and Pull out of process","Deep dive on specific gap(s)","Set call with prospect and Tommy/Des"],
    DeepDiscovery_NotRisky:  ["Schedule Deep Dive Demo","Tailor specific workflow demo","Make Exec Connection","Move to Trial"],
    DeepDiscovery_Risky:     ["Review gaps with product and understand roadmap","Present workarounds to gaps","Schedule call with Product to present roadmap to prospect","Share gaps with prospect and get prioritisation","Refocus on the pain we can solve with prospect"],
    DeepDiscovery_VeryRisky: ["Make Go/No-Go decision with Sales & Product Leaders","Schedule call to sell partnership and present potential solutions","Share gaps with prospect and get prioritisation","Formulate product asks and evaluate development options","Refocus on the pain we can solve with prospect"],
    DeepDemo_NotRisky:       ["Push for product win","Set up references","Ask for Sale"],
    DeepDemo_Risky:          ["Get feedback on complexity and gaps from Steve McC","Share gaps with prospect and get prioritisation","Confirm product commitments","Validate solution solves core pains"],
    DeepDemo_VeryRisky:      ["Get feedback on complexity and gaps from Steve McC","Share gaps with prospect and get prioritisation","Confirm product commitments","Validate solution solves core pains","Get input from Steve McC & CX Leadership"],
    Trial_NotRisky:          ["Push for product win","Set up references","Ask for Sale"],
    Trial_Risky:             ["Get feedback on complexity and gaps from Steve McC","Share gaps with prospect and get prioritisation","Validate solution solves core pains"],
    Trial_VeryRisky:         ["Get feedback on complexity and gaps from Steve McC","Share gaps with prospect and get prioritisation","Validate solution solves core pains","Get input from Steve McC & CX Leadership"],
    Validation_NotRisky:     ["Get product win confirmation","Confirm LearnUpon solves their key pains","Ask for Sale","Ensure MAP in place and on-track"],
    Validation_Risky:        ["Get feedback on complexity and gaps from Steve McC","Share gaps with prospect and get prioritisation","Validate solution solves core pains"],
    Validation_VeryRisky:    ["Get feedback on complexity and gaps from Steve McC","Share gaps with prospect and get prioritisation","Validate solution solves core pains","Get input from Steve McC & CX Leadership"],
  }
};

/**
 * ==========================================
 * MODULE 2: STATE MANAGEMENT
 * ==========================================
 */
const State = {
  currentTab: 'employee',
  answers: { employee: {}, customer: {}, member: {} },
  
  getUseCase: () => document.getElementById('useCase').value,
  getDealStage: () => document.getElementById('dealStage').value,
  
  setAnswer: (index, value) => {
    State.answers[State.currentTab][index] = value;
  }
};

/**
 * ==========================================
 * MODULE 3: CORE LOGIC & CALCULATION
 * ==========================================
 */
const Logic = {
  scoreAnswer: (answer, type) => {
    if (type === 'pain') return answer === 'Yes' ? 1 : answer === 'No' ? -3 : 0;
    if (answer === 'Critical')     return -3;
    if (answer === 'Not Needed')   return 1;
    if (answer === 'Nice-to-Have') return -1;
    return 0;
  },

  computeTabScore: (tabKey) => {
    const uc = State.getUseCase();
    return DataStore.TABS[tabKey].rows.reduce((sum, row, i) => {
      const ans = State.answers[tabKey][i] !== undefined ? State.answers[tabKey][i] : "Don't Know";
      return sum + (row.w[uc] || 0) * Logic.scoreAnswer(ans, row.type);
    }, 0);
  },

  getStatusKey: (score, stage) => {
    const s = {'Initial Discovery':'Discovery','Initial Demo':'Demo','Deep Dive Discovery':'DeepDiscovery','Deep Dive Demo':'DeepDemo','Trial':'Trial','Solution Validation':'Validation'}[stage]||'Demo';
    return `${s}_${score>=0?'NotRisky':score>=-100?'Risky':'VeryRisky'}`;
  },

  getRiskColor: (score) => {
    return score >= 0 ? 'green' : score >= -100 ? 'amber' : 'red';
  },

  getRiskLabel: (score) => {
    if (score >= 0)    return ['Not Risky','Go Ahead!'];
    if (score >= -100) return ['Risky','Discuss with Managers'];
    return ['Very Risky','Discuss with Tommy / Laura / Des'];
  }
};

/**
 * ==========================================
 * MODULE 4: UI RENDERING & APP CONTROLLER
 * ==========================================
 */
const App = {
  switchTab: (tabKey) => {
    State.currentTab = tabKey;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabKey).classList.add('active');
    App.renderRows(); 
    App.recompute();
  },

  handleUseCaseChange: () => {
    App.renderRows();
    App.recompute();
  },

  handleAnswerChange: (index, value) => {
    State.setAnswer(index, value);
    App.renderRows();
    App.recompute();
  },

  renderRows: () => {
    const uc = State.getUseCase();
    const rows = DataStore.TABS[State.currentTab].rows;
    const ans = State.answers[State.currentTab];
    const groups = [];
    
    rows.forEach((row, i) => {
      const last = groups[groups.length-1];
      if (!last || last.cat !== row.cat) groups.push({cat:row.cat, items:[]});
      groups[groups.length-1].items.push({row,i});
    });
    
    let html = '';
    groups.forEach(g => {
      html += `<div class="category-group"><div class="category-header">${g.cat}</div>`;
      g.items.forEach(({row,i}) => {
        const answer = ans[i] !== undefined ? ans[i] : "Don't Know";
        const w = row.w[uc] || 0;
        const s = Logic.scoreAnswer(answer, row.type);
        const ws = w * s;
        const wsClass = ws > 0 ? 'pos' : ws < 0 ? 'neg' : 'zero';
        const selClass = answer==='Critical'?'critical':answer==='Not Needed'?'not-needed':answer==='Nice-to-Have'?'nice':'';
        const opts = (row.type==='pain' ? ["Don't Know","Yes","No"] : ["Don't Know","Critical","Not Needed","Nice-to-Have"])
          .map(o=>`<option value="${o}"${answer===o?' selected':''}>${o}</option>`).join('');
        
        html += `<div class="score-row">
          <div class="row-question">${row.q}</div>
          <div class="row-answer"><select class="${selClass}" onchange="App.handleAnswerChange(${i},this.value)">${opts}</select></div>
          <div class="row-weight">${w>0?w:'—'}</div>
          <div class="row-wscore ${wsClass}">${ws!==0?(ws>0?'+':'')+ws:'—'}</div>
        </div>`;
      });
      html += '</div>';
    });
    document.getElementById('rowsContainer').innerHTML = html;
  },

  recompute: () => {
    const uc = State.getUseCase();
    const stage = State.getDealStage();
    const score = Logic.computeTabScore(State.currentTab);
    const rows = DataStore.TABS[State.currentTab].rows;

    // 1. Pills for all tabs
    ['employee','customer','member'].forEach(t => {
      const s = Logic.computeTabScore(t);
      const el = document.getElementById('pill-'+t);
      el.textContent = s;
      el.style.color = s>=0?'var(--green)':s>=-100?'var(--amber)':'var(--red)';
    });

    // 2. Meter
    const min = rows.reduce((a,r) => a+(r.w[uc]||0)*-3, 0);
    const max = rows.reduce((a,r) => a+(r.w[uc]||0)*1, 0);
    const pct = ((score-min)/(max-min||1))*100;
    const cv = score>=0?'var(--green)':score>=-100?'var(--amber)':'var(--red)';
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('scoreDisplay').style.color = cv;
    document.getElementById('rangeDisplay').textContent = `${min} → ${max}`;
    document.getElementById('meterFill').style.cssText = `width:${Math.max(2,pct)}%;background:${cv}`;

    // 3. Status
    const [rLabel, rSub] = Logic.getRiskLabel(score);
    const color = Logic.getRiskColor(score);
    const sb = document.getElementById('statusBlock');
    sb.className = `status-badge ${color}`;
    document.getElementById('statusTitle').textContent = rLabel;
    document.getElementById('statusSub').textContent = rSub;
    document.getElementById('globalStatus').className = `status-badge ${color}`;
    document.getElementById('globalStatus').innerHTML = `<div class="status-dot"></div><span>${rLabel}</span>`;

    // 4. Next steps
    const key = Logic.getStatusKey(score, stage);
    const steps = DataStore.NEXT_STEPS[key] || [];
    document.getElementById('nextStepsList').innerHTML = steps.length
      ? steps.map((s,i)=>`<div class="next-step-item"><span class="step-num">${String(i+1).padStart(2,'0')}</span><span>${s}</span></div>`).join('')
      : `<div class="next-step-item" style="color:var(--muted)"><span class="step-num">—</span><span>Complete assessment to see actions</span></div>`;

    // 5. Breakdown Categories
    const catScores = {};
    rows.forEach((row,i) => {
      const a = State.answers[State.currentTab][i] !== undefined ? State.answers[State.currentTab][i] : "Don't Know";
      catScores[row.cat] = (catScores[row.cat]||0) + (row.w[uc]||0) * Logic.scoreAnswer(a,row.type);
    });
    
    document.getElementById('breakdownGrid').innerHTML = Object.entries(catScores)
      .filter(([,v])=>v!==0).sort(([,a],[,b])=>a-b)
      .map(([cat,val])=>`<div class="breakdown-row"><span class="breakdown-cat">${cat}</span><span class="breakdown-val" style="color:${val>=0?'var(--green)':'var(--red)'}">${val>0?'+':''}${val}</span></div>`).join('')
      || `<div style="color:var(--muted);font-size:12px">No scored items yet</div>`;
  },

  exportExcel: () => {
    const wb = XLSX.utils.book_new();
    const stage = State.getDealStage();
    const uc = State.getUseCase();
    const ucLabel = {I:'Internal',E:'External',B:'Both'}[uc];
    const name = document.getElementById('prospectName').value || 'Prospect';
    const learners = document.getElementById('learnerCount').value || '';
    
    Object.entries(DataStore.TABS).forEach(([tabKey, tab]) => {
      const rows = tab.rows;
      const ans = State.answers[tabKey];
      const score = Logic.computeTabScore(tabKey);
      const [rLabel] = Logic.getRiskLabel(score);
      const steps = DataStore.NEXT_STEPS[Logic.getStatusKey(score, stage)] || [];
      
      const data = [
        [`LearnUpon Complexity Scorecard — ${tab.label}`],
        [`Prospect: ${name}`,'',`Learner Count: ${learners}`,'',`Use Case: ${ucLabel}`,'',`Stage: ${stage}`],
        [],
        ['Category','Requirement / Feature','Assessment','Weighting','Score','Weighted Score'],
      ];
      
      rows.forEach((row, i) => {
        const answer = ans[i] !== undefined ? ans[i] : "Don't Know";
        const w = row.w[uc] || 0;
        const s = Logic.scoreAnswer(answer, row.type);
        data.push([row.cat, row.q, answer, w, s, w*s]);
      });
      
      data.push([],[,'','','','TOTAL SCORE',score],[,'','','','STATUS',rLabel],[],['Suggested Next Steps']);
      steps.forEach((s, i) => data.push([`${i+1}.`, s]));
      
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{wch:20},{wch:55},{wch:15},{wch:12},{wch:8},{wch:15}];
      XLSX.utils.book_append_sheet(wb, ws, tab.label.substring(0,31));
    });
    
    XLSX.writeFile(wb, `LU_Scorecard_${name.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    App.showToast('Exported successfully');
  },

  showToast: (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg; 
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
};

/**
 * ==========================================
 * MODULE 5: INITIALIZATION
 * ==========================================
 */
document.addEventListener('DOMContentLoaded', () => {
  App.renderRows(); 
  App.recompute();
});
</script>
</body>
</html>
